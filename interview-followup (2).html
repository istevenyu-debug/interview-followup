<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="面試追問">
<title>面試追問產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f1;
    --bg3: #eeece8;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #a8a8a3;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --blue-border: #85b7eb;
    --red-bg: #fcebeb;
    --red-text: #791f1f;
    --red-border: #f09595;
    --r-md: 10px;
    --r-lg: 16px;
    --r-xl: 22px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #262624;
      --bg3: #2e2e2b;
      --text: #f0ede8;
      --text2: #9a9a94;
      --text3: #5a5a56;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --blue-bg: #042c53;
      --blue-text: #b5d4f4;
      --blue-border: #185fa5;
      --red-bg: #501313;
      --red-text: #f7c1c1;
      --red-border: #a32d2d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }

  body { display: flex; flex-direction: column; }

  header {
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 51px; font-weight: 500; letter-spacing: -0.01em; }
  header p { font-size: 36px; color: var(--text2); margin-top: 2px; }

  main { flex: 1; overflow-y: auto; padding: 16px 16px 100px; }

  .tbox {
    width: 100%;
    min-height: 120px;
    border: 0.5px solid var(--border2);
    border-radius: var(--r-lg);
    padding: 14px;
    font-size: 45px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    background: var(--bg);
    resize: none;
    outline: none;
    line-height: 1.65;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .tbox::placeholder { color: var(--text3); }
  .tbox:focus { border-color: var(--border2); }
  .tbox.listening { border-color: #e24b4a; }

  .mic-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; min-height: 22px;
  }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: #e24b4a; display: none; animation: pulse 1.1s ease-in-out infinite; }
  .pulse.on { display: block; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.4} }
  .mic-label { font-size: 36px; color: var(--text3); }

  .btns { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 120px; border-radius: var(--r-lg);
    font-size: 45px; font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text);
    transition: opacity .12s, transform .08s;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); opacity: .8; }
  .btn:disabled { opacity: 0.35; }
  .btn svg { width: 60px; height: 60px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .btn.rec { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .btn.go  { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue-text); }
  .btn.sm  { flex: 0 0 120px; }

  .note { font-size: 36px; color: var(--text3); margin-top: 6px; line-height: 1.5; }

  .divider { height: 0.5px; background: var(--border); margin: 20px 0 14px; }

  .rl { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .rl-label { font-size: 36px; font-weight: 500; color: var(--text2); letter-spacing: .05em; }
  .cnt { font-size: 33px; padding: 3px 10px; border-radius: 99px; background: var(--bg2); color: var(--text2); }

  .qlist { display: flex; flex-direction: column; gap: 10px; }

  .qcard {
    border: 0.5px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px;
    background: var(--bg);
    animation: fi .25s ease both;
  }
  @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .qcard.top { border-left: 2.5px solid #378add; border-radius: 0 var(--r-lg) var(--r-lg) 0; }

  .qrow { display: flex; gap: 10px; }
  .qnum {
    font-size: 33px; font-weight: 500; min-width: 54px; height: 54px;
    border-radius: 50%; background: var(--bg2); color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .qt { font-size: 45px; color: var(--text); line-height: 1.6; }
  .qr { font-size: 39px; color: var(--text2); margin-top: 6px; line-height: 1.5; }
  .qtag {
    display: inline-block; font-size: 33px; padding: 3px 9px;
    border-radius: 99px; background: var(--bg2); margin-top: 7px;
    font-weight: 500;
  }

  .empty {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--text3); font-size: 42px;
    border: 0.5px dashed var(--border2); border-radius: var(--r-lg);
    line-height: 1.7;
  }
  .empty svg { width: 72px; height: 72px; stroke: var(--text3); fill: none; stroke-width: 1.5; display: block; margin: 0 auto 10px; opacity: .4; }

  .loading {
    display: flex; align-items: center; gap: 10px;
    padding: 14px; border: 0.5px solid var(--border);
    border-radius: var(--r-lg); font-size: 42px; color: var(--text2);
  }
  .spin {
    width: 16px; height: 16px; flex-shrink: 0;
    border: 1.5px solid var(--border2); border-top-color: var(--text2);
    border-radius: 50%; animation: sp .7s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* PWA add to homescreen hint */
  .pwa-hint {
    margin-top: 14px; padding: 12px 14px;
    background: var(--bg2); border-radius: var(--r-lg);
    font-size: 36px; color: var(--text2); line-height: 1.6;
  }
  .pwa-hint strong { color: var(--text); font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>面試追問產生器</h1>
  <p>錄音或輸入自我介紹，AI 即時產生追問</p>
</header>

<main>
  <textarea id="tbox" class="tbox" placeholder="貼上或輸入候選人陳述內容…" rows="5"></textarea>

  <div class="mic-row">
    <div class="pulse" id="dot"></div>
    <span class="mic-label" id="micLabel"></span>
  </div>

  <div class="btns">
    <button class="btn rec" id="micBtn" onclick="toggleMic()">
      <svg id="micIcon" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <span id="micText">開始錄音</span>
    </button>
    <button class="btn go" id="goBtn" onclick="analyze()" disabled>
      <svg viewBox="0 0 24 24"><path d="M12 3l1.9 5.8H20l-4.9 3.6 1.9 5.8L12 14.6l-5 3.6 1.9-5.8L4 8.8h6.1z"/></svg>
      產生追問
    </button>
    <button class="btn sm" onclick="clearAll()" aria-label="清除">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
  </div>

  <div class="note" id="note" style="display:none"></div>

  <div class="pwa-hint">
    <strong>加入主畫面：</strong>iOS 點 Safari 底部「分享」→「加入主畫面」；Android 點瀏覽器選單「新增至主畫面」，即可像 App 一樣開啟。
  </div>

  <div class="divider"></div>

  <div class="rl">
    <span class="rl-label">追問建議</span>
    <span class="cnt" id="cnt">0 題</span>
  </div>
  <div class="qlist" id="qlist">
    <div class="empty">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></svg>
      分析後顯示於此
    </div>
  </div>
</main>

<script>
const ANTHROPIC_KEY = '';  // 若要固定 key 可填入，留空則每次需輸入

let rec = null, listening = false;
let tbox = document.getElementById('tbox');
let dot = document.getElementById('dot');
let micLabel = document.getElementById('micLabel');
let micBtn = document.getElementById('micBtn');
let micText = document.getElementById('micText');
let micIcon = document.getElementById('micIcon');
let goBtn = document.getElementById('goBtn');
let qlist = document.getElementById('qlist');
let cnt = document.getElementById('cnt');
let note = document.getElementById('note');
let apiKey = ANTHROPIC_KEY;

tbox.addEventListener('input', checkInput);

function checkInput() {
  goBtn.disabled = tbox.value.trim().length < 10;
}

function toggleMic() {
  if (listening) { stopMic(); return; }
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showNote('此裝置或瀏覽器不支援語音辨識，請改用文字輸入（建議使用 Chrome）');
    return;
  }
  hideNote();
  rec = new SR();
  rec.lang = 'zh-TW';
  rec.continuous = true;
  rec.interimResults = true;
  let finalText = tbox.value;

  rec.onstart = () => {
    listening = true;
    micBtn.className = 'btn rec';
    micText.textContent = '停止錄音';
    micIcon.innerHTML = '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>';
    tbox.classList.add('listening');
    dot.classList.add('on');
    micLabel.textContent = '語音辨識中…';
  };
  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    tbox.value = finalText + interim;
    checkInput();
  };
  rec.onerror = (e) => { showNote('語音錯誤：' + e.error); stopMic(); };
  rec.onend = () => { if (listening) rec.start(); };
  rec.start();
}

function stopMic() {
  listening = false;
  if (rec) { rec.onend = null; rec.stop(); }
  micBtn.className = 'btn rec';
  micText.textContent = '開始錄音';
  micIcon.innerHTML = '<rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>';
  tbox.classList.remove('listening');
  dot.classList.remove('on');
  micLabel.textContent = '';
  checkInput();
}

function clearAll() {
  stopMic(); tbox.value = ''; checkInput();
  qlist.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></svg>分析後顯示於此</div>';
  cnt.textContent = '0 題';
}

function showNote(msg) { note.textContent = msg; note.style.display = 'block'; }
function hideNote() { note.style.display = 'none'; }

const typeColor = {
  '技能驗證': '#185FA5', '動機釐清': '#3B6D11',
  '細節追問': '#854F0B', '邏輯確認': '#534AB7', '軟實力探索': '#993556'
};

async function analyze() {
  let text = tbox.value.trim();
  if (text.length < 10) return;

  if (!apiKey) {
    let k = prompt('請輸入您的 Anthropic API Key（僅此次使用，不會儲存）：');
    if (!k) return;
    apiKey = k.trim();
  }

  qlist.innerHTML = '<div class="loading"><div class="spin"></div>AI 分析中，請稍候…</div>';
  goBtn.disabled = true;

  try {
    let resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `你是資深面試官助理。分析以下求職者陳述，提取 4–6 個值得深入追問的問題。

每題包含：question（追問問題）、reason（追問原因，20字內）、type（技能驗證/動機釐清/細節追問/邏輯確認/軟實力探索）

只回傳 JSON 陣列，不含說明或反引號：
[{"question":"…","reason":"…","type":"…"}]

陳述：${text}`
        }]
      })
    });

    if (!resp.ok) {
      let err = await resp.json().catch(() => ({}));
      if (resp.status === 401) { apiKey = ''; showNote('API Key 無效，請重新輸入'); }
      else showNote('錯誤 ' + resp.status + '：' + (err.error?.message || '請稍後再試'));
      qlist.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>分析失敗</div>';
      goBtn.disabled = false; return;
    }

    let data = await resp.json();
    let raw = data.content.map(i => i.text || '').join('');
    let qs = JSON.parse(raw.replace(/```json|```/g, '').trim());

    cnt.textContent = qs.length + ' 題';
    qlist.innerHTML = '';
    qs.forEach((q, i) => {
      let card = document.createElement('div');
      card.className = 'qcard' + (i === 0 ? ' top' : '');
      card.style.animationDelay = (i * 55) + 'ms';
      let col = typeColor[q.type] || '#6b6b67';
      card.innerHTML = `
        <div class="qrow">
          <div class="qnum">${i + 1}</div>
          <div style="flex:1">
            <div class="qt">${q.question}</div>
            <div class="qr">${q.reason}</div>
            <span class="qtag" style="color:${col}">${q.type}</span>
          </div>
        </div>`;
      qlist.appendChild(card);
    });
  } catch(e) {
    showNote('網路或解析錯誤，請稍後再試');
    qlist.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>分析失敗</div>';
  }
  goBtn.disabled = false;
}
</script>
</body>
</html>
